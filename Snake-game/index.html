<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇游戏</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title-bar">
                <h1>🐍 贪吃蛇</h1>
                <button id="musicBtn" class="music-btn">🔊</button>
            </div>
            <div class="info-panel">
                <div class="info-item">
                    <span>关卡:</span>
                    <span id="level">1</span>
                </div>
                <div class="info-item">
                    <span>分数:</span>
                    <span id="score">0</span>
                </div>
                <div class="info-item">
                    <span>目标:</span>
                    <span id="target">30</span>
                </div>
                <div class="info-item">
                    <span>时间:</span>
                    <span id="timer">60</span>
                </div>
            </div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div class="controls">
            <p>使用方向键 ↑↓←→ 控制蛇的移动</p>
            <div class="food-guide">
                <span class="food-cookie">🍪 小饼干 +1分</span>
                <span class="food-mouse">🐭 小老鼠 +3分</span>
                <span class="food-elephant">🐘 大象 +10分</span>
            </div>
        </div>
    </div>
    
    <div id="startModal" class="modal">
        <div class="modal-content">
            <h2>🐍 贪吃蛇游戏</h2>
            <p>准备好开始了吗？</p>
            <button id="startBtn">开始游戏</button>
        </div>
    </div>
    
    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <h2 id="modalTitle">游戏结束</h2>
            <div id="modalStars" class="stars hidden"></div>
            <p id="modalScore">总分数: 0</p>
            <button id="modalBtn">再来一次</button>
        </div>
    </div>

    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg">
    </audio>

    <script src="game.js"></script>
</body>
</html>
